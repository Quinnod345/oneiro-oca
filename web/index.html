<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oneiro — Cognitive Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ambient">
        <div class="orb orb-purple"></div>
        <div class="orb orb-blue"></div>
    </div>

    <header>
        <div class="header-left">
            <span class="moon">🌑</span>
            <span class="title">ONEIRO</span>
            <a href="neural.html" style="font-size:11px;color:#8738EB;text-decoration:none;opacity:0.7;margin-left:12px;">Neural Map →</a>
        </div>
        <div class="header-right">
            <button class="notif-bell" id="notifBell" onclick="toggleNudgeOverlay()" title="Nudges">
                🔔
                <span class="notif-badge" id="notifBadge" style="display:none">0</span>
            </button>
            <div class="connection-indicator">
                <span class="dot" id="connDot"></span>
                <span class="conn-text" id="connText">connecting</span>
            </div>
        </div>
    </header>

    <!-- Nudge overlay (slides in from right) -->
    <div class="nudge-overlay" id="nudgeOverlay">
        <div class="nudge-overlay-header">
            <span class="nudge-overlay-title">🔔 Nudges</span>
            <button class="nudge-overlay-close" onclick="toggleNudgeOverlay()">✕</button>
        </div>
        <div class="nudge-compose">
            <div class="nudge-compose-label">Bias The Mind</div>
            <div class="nudge-compose-row">
                <input type="text" id="overlayNudgeInput" class="nudge-compose-input" placeholder="Nudge Oneiro without giving a directive…">
                <button class="nudge-compose-btn" onclick="sendNudgeFromInput('overlayNudgeInput')" title="Send nudge">↑</button>
            </div>
        </div>
        <div class="nudge-overlay-feed" id="nudgeOverlayFeed">
            <div class="nudge-empty">No nudges yet</div>
        </div>
    </div>
    <div class="nudge-overlay-backdrop" id="nudgeBackdrop" onclick="toggleNudgeOverlay()"></div>

    <main>
        <div class="grid">
            <!-- CRM Panel -->
            <section class="panel crm-panel">
                <h2>Chinese Room Meter</h2>
                <div class="crm-content">
                    <div class="crm-ring-container">
                        <svg class="crm-ring" viewBox="0 0 120 120">
                            <circle class="ring-bg" cx="60" cy="60" r="52" />
                            <circle class="ring-fg" id="crmRing" cx="60" cy="60" r="52" />
                        </svg>
                        <div class="crm-score" id="crmScore">—</div>
                    </div>
                    <div class="crm-interpretation" id="crmInterpretation"></div>
                    <div class="crm-components" id="crmComponents"></div>
                </div>
            </section>

            <!-- Emotion Panel -->
            <section class="panel emotion-panel">
                <h2>Emotion State</h2>
                <div class="emotion-meta" id="emotionMeta"></div>
                <div class="emotion-bars" id="emotionBars"></div>
            </section>

            <!-- Body Mode -->
            <section class="panel body-panel">
                <h2>Body Ownership</h2>
                <div class="body-mode" id="bodyMode">
                    <span class="body-icon">—</span>
                    <span class="body-label">—</span>
                </div>
            </section>

            <!-- Working Memory -->
            <section class="panel memory-panel">
                <h2>Working Memory</h2>
                <div class="memory-slots" id="memorySlots"></div>
            </section>

            <!-- Goals -->
            <section class="panel goals-panel">
                <h2>Active Goals</h2>
                <div class="goals-list" id="goalsList"></div>
            </section>

            <!-- Dreams -->
            <section class="panel dreams-panel">
                <h2>Dreams (Emotion-Led)</h2>
                <div class="dream-meta" id="dreamMeta">loading…</div>
                <div class="dream-list" id="dreamList"></div>
                <button class="dream-act-btn" id="dreamActBtn">Act On Dreams Now</button>
            </section>

            <!-- Hypotheses -->
            <section class="panel hypo-panel">
                <h2>Hypotheses</h2>
                <div class="hypo-list" id="hypoList"></div>
            </section>

            <!-- Perception -->
            <section class="panel perception-panel">
                <h2>Perception</h2>
                <div class="perception-data" id="perceptionData"></div>
                <div class="visual-memory-latest" id="visualMemoryLatest"></div>
                <div class="visual-memory-search">
                    <input type="text" id="visualSearchInput" placeholder="Search visual memory (e.g. stripe docs tab)">
                    <button id="visualSearchBtn" class="visual-search-btn">Search</button>
                </div>
                <div class="visual-search-results" id="visualSearchResults"></div>
            </section>

            <!-- Nudges -->
            <section class="panel nudges-panel">
                <h2>Nudges</h2>
                <div class="nudge-compose nudge-compose-panel">
                    <div class="nudge-compose-label">Bias The Mind</div>
                    <div class="nudge-compose-row">
                        <input type="text" id="panelNudgeInput" class="nudge-compose-input" placeholder="Nudge Oneiro without giving a directive…">
                        <button class="nudge-compose-btn" onclick="sendNudgeFromInput('panelNudgeInput')" title="Send nudge">↑</button>
                    </div>
                </div>
                <div class="nudges-list" id="nudgesList">
                    <div class="nudge-empty">No nudges yet</div>
                </div>
            </section>

            <!-- Chat -->
            <section class="panel chat-panel">
                <h2>Chat</h2>
                <div class="chat-messages" id="chatMessages">
                    <div class="chat-empty">Send a message to Oneiro…</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Message Oneiro…" autocomplete="off">
                    <button id="chatSend" class="send-btn">↑</button>
                </div>
            </section>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
